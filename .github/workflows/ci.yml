# ============================================================
# CI WORKFLOW — Continuous Integration
# ============================================================
# WHAT IT DOES:
#   Runs on every push and pull request to catch problems early.
#   Steps: Install deps → Lint → Test → Coverage report
#
# WHY CI?
#   CI ensures that every code change is automatically validated.
#   If tests break or code style is wrong, you know IMMEDIATELY,
#   not days later when deploying to production.
# ============================================================

name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # moto mock library requires a default AWS region even for mocked services
    env:
      AWS_DEFAULT_REGION: us-east-1

    # Strategy matrix: test on multiple Python versions
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      # ── Step 1: Check out the code ───────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Step 3: Cache pip dependencies ───────────────
      # Caching speeds up workflows by reusing downloaded packages
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install dependencies ─────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # ── Step 5: Lint with flake8 ─────────────────────
      # flake8 checks for style issues and potential bugs
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings (max line length 120)
          flake8 src/ tests/ --count --max-line-length=120 --statistics --exit-zero

      # ── Step 6: Run tests with coverage ──────────────
      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=term-missing

      # ── Step 7: Upload coverage report ───────────────
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
